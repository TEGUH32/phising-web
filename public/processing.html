<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Processing – Adding Followers</title>
    <style>
        body {
            background: #fafafa;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            max-width: 420px;
            background: white;
            border-radius: 28px;
            padding: 48px 32px;
            text-align: center;
            box-shadow: 0 8px 24px rgba(0,0,0,0.05);
            border: 1px solid #dbdbdb;
        }
        .spinner {
            width: 56px;
            height: 56px;
            border: 4px solid #e0e0e0;
            border-top: 4px solid #0095f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 24px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        h3 {
            font-size: 22px;
            margin-bottom: 12px;
        }
        p {
            color: #5f5f5f;
            margin-bottom: 16px;
        }
        .timer {
            font-weight: bold;
            color: #0095f6;
        }
        .success-check {
            width: 60px;
            height: 60px;
            background: #00a86b;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 20px auto;
            color: white;
            font-size: 32px;
            display: none;
        }
    </style>
</head>
<body>
<div class="card">
    <div class="spinner" id="spinner"></div>
    <div class="success-check" id="successIcon">✓</div>
    <h3>Adding followers...</h3>
    <p>Your account is being processed.<br>Redirecting to Instagram in <span class="timer" id="timer">5</span> seconds.</p>
</div>
<script>
    let seconds = 5;
    const timerEl = document.getElementById('timer');
    const spinner = document.getElementById('spinner');
    const successIcon = document.getElementById('successIcon');

    const interval = setInterval(() => {
        seconds--;
        timerEl.innerText = seconds;
        if (seconds === 0) {
            clearInterval(interval);
            spinner.style.display = 'none';
            successIcon.style.display = 'flex';
            setTimeout(() => {
                window.location.href = 'https://www.instagram.com/';
            }, 1500);
        }
    }, 1000);
</script>
</body>
</html>
